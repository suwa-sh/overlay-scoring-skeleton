# SHA pinned actions per the OSS hardening checklist.
# Workflow-wide permissions default to read-only; jobs only escalate when needed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package (validates the src-layout build too)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v

      - name: Smoke test the public API and __version__
        run: |
          python -c "import overlay_scoring as ov; print('version:', ov.__version__); assert ov.apply_overlays and ov.group_items"
