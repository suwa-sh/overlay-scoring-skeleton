# SHA pinned actions per the OSS hardening checklist.
# Workflow-wide permissions default to read-only; jobs only escalate when needed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package (validates the src-layout build too)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v

      - name: Smoke test the public API and __version__
        run: |
          python -c "import overlay_scoring as ov; print('version:', ov.__version__); assert ov.apply_overlays and ov.group_items"
